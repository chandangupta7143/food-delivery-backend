spring:
  application:
    name: food-delivery-backend

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/food_delivery}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

surge:
  token:
    secret: ${SURGE_TOKEN_SECRET:default-surge-token-shared-secret-key-32-bytes-long}

jwt:
  secret: ${JWT_SECRET:default-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256}
  expiration: ${JWT_EXPIRATION:86400000}

admin:
  email: ${ADMIN_EMAIL:admin@fooddelivery.com}
  password: ${ADMIN_PASSWORD:Admin@123}
  name: ${ADMIN_NAME:System Admin}

server:
  port: ${SERVER_PORT:8082}
